<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- viewport-fit=cover lets the app extend under the iPhone notch;
         we then use env(safe-area-inset-*) in CSS to pad away from it -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / home-screen meta -->
    <meta name="theme-color" content="#5b8a6e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SpeedyReedy" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <title>EZ Speedy Reedy</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
